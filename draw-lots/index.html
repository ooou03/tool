<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draw Lots 抽籤小工具</title>
    <style>
        /* ================= 極簡現代版 CSS 設計 ================= */
        :root {
            --bg-color: #f4fdf6;      /* 更清爽、更淡的淺綠底色 */
            --card-bg: #ffffff;
            --text-main: #1e293b;     /* 標題顏色加深 */
            --text-muted: #737373;
            --border-color: #e5e5e5;
            --primary: #10b981;       /* 清新的翡翠綠 */
            --primary-hover: #059669; /* 深一點的綠色作為 Hover 狀態 */
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "微軟正黑體", sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle, #dcfce7 2px, transparent 2px); /* 縮小點點並調淡顏色 */
            background-size: 40px 40px; /* 增加點點之間的間距 */
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 800px; /* 放寬以容納標題列 */
            padding-bottom: 40px;
        }

        /* 標題區塊 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding: 28px 36px;
            background-color: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .header h1 {
            margin: 0;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 0.5px;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header p {
            margin: 10px 0 0 0;
            color: #059669; /* 深綠色副標題 */
            font-size: 16px;
            font-weight: 600;
        }

        /* 設定按鈕專屬設計 (仿原圖) */
        .btn-settings {
            background-color: #ecfdf5;
            color: #047857;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-settings:hover {
            background-color: #d1fae5;
            transform: translateY(-1px);
        }

        /* 按鈕設計 */
        .btn {
            padding: 10px 20px;
            border-radius: 9999px; /* 膠囊形狀 */
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
        }

        .btn-outline {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }
        .btn-outline:hover { 
            background-color: #f5f5f5; 
            border-color: #d4d4d4;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            font-size: 18px;
            padding: 16px 48px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: scale(1.02);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            background-color: #a3a3a3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .hidden { display: none !important; }

        /* 順序列表區塊 */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .list-item {
            background: var(--card-bg);
            border-radius: var(--radius-md);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .list-item.highlight {
            transform: scale(1.02);
            box-shadow: var(--shadow-md);
            border-color: var(--primary);
            z-index: 10;
            position: relative;
        }

        /* 名次數字設計 (方塊圓角風格) */
        .rank-badge {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 800;
            margin-right: 18px;
            flex-shrink: 0;
            background: #f5f5f5; 
            color: #a3a3a3; /* 降低 4 名以後的數字顏色，拉開層次 */
            border: 1px solid #e5e5e5;
        }

        /* 前三名特別的高亮與陰影設計，讓它們更像獎牌 */
        .rank-1 .rank-badge { 
            background: #fffbeb; 
            color: #d97706; 
            border-color: #fcd34d; 
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.25);
        } /* 金 */
        
        .rank-2 .rank-badge { 
            background: #f1f5f9; /* 偏冷色調的金屬灰，區別於一般灰底 */
            color: #334155; 
            border-color: #cbd5e1; 
            box-shadow: 0 2px 8px rgba(100, 116, 139, 0.25);
        } /* 銀 */
        
        .rank-3 .rank-badge { 
            background: #fff7ed; 
            color: #c2410c; 
            border-color: #fdba74; 
            box-shadow: 0 2px 8px rgba(234, 88, 12, 0.25);
        } /* 銅 */

        .group-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            flex-grow: 1;
            letter-spacing: 0.5px;
        }

        .status-icon {
            font-size: 24px;
            width: 32px;
            text-align: right;
            opacity: 0.9;
        }

        /* 快速跳動的模糊特效 */
        .blur-text {
            filter: blur(3px);
            opacity: 0.4;
            transform: scale(0.95);
            transition: all 0.1s;
        }

        /* 複製結果區塊 */
        .result-container {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
        }

        .result-textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-family: monospace;
            font-size: 16px;
            color: var(--text-main);
            background-color: #f9fafb;
            resize: none; 
            box-sizing: border-box;
            line-height: 1.6;
        }

        .result-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* 設定彈跳視窗 Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px); /* 現代玻璃毛玻璃效果 */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 32px;
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 420px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-md);
            box-sizing: border-box;
            border: 1px solid var(--border-color);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-shrink: 0;
        }
        .modal-header h2 { margin: 0; font-size: 22px; font-weight: 800;}
        .close-btn { 
            background: #f5f5f5; 
            border: none; 
            width: 32px; height: 32px;
            border-radius: 50%;
            font-size: 16px; 
            cursor: pointer; 
            color: var(--text-muted); 
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .close-btn:hover { background: #e5e5e5; color: var(--text-main); }

        .modal-body {
            overflow-y: auto;
            padding-right: 8px;
            flex-grow: 1;
        }

        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-thumb { background-color: #d4d4d4; border-radius: 10px; }

        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-main); font-size: 14px; font-weight: 600;}
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid transparent;
            border-radius: var(--radius-sm);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 15px;
            background-color: #f5f5f5;
            transition: all 0.2s;
        }
        .input-group select { cursor: pointer; }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: white;
        }

        .divider {
            height: 1px;
            background-color: var(--border-color);
            margin: 24px 0;
        }

        .modal-footer {
            margin-top: 24px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 頂部標題區 -->
        <header class="header">
            <div>
                <h1>🎰 Draw Lots</h1>
                <p>點擊下方按鈕，隨機決定上場與排列順序！</p>
            </div>
            <button onclick="toggleSettings()" class="btn-settings">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                自訂設定
            </button>
        </header>

        <!-- 順序列表區 -->
        <main class="list-container" id="listContainer">
            <!-- 內容由 JS 動態生成 -->
        </main>

        <!-- 操作按鈕 -->
        <div class="action-buttons">
            <button id="drawBtn" onclick="startDraw()" class="btn btn-primary">
                開始抽籤
            </button>
            <button id="resetBtn" onclick="resetDraw()" class="btn btn-primary hidden" style="background-color: #3f3f46;">
                重新抽籤
            </button>
        </div>

        <!-- 複製結果區塊 -->
        <div id="resultContainer" class="result-container hidden">
            <div class="result-header">
                <h3>📝 抽籤結果</h3>
                <button onclick="copyResult()" class="btn btn-outline" id="copyBtn" style="font-size: 13px; padding: 6px 14px;">
                    複製結果
                </button>
            </div>
            <textarea id="resultText" class="result-textarea" readonly></textarea>
        </div>
    </div>

    <!-- 設定 Modal -->
    <div id="settingsModal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>設定</h2>
                <button onclick="toggleSettings()" class="close-btn">✕</button>
            </div>

            <div class="modal-body">
                <!-- 數量設定 -->
                <div class="input-group">
                    <label for="itemCount">參與數量</label>
                    <select id="itemCount" onchange="generateSettingsInputs()">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5" selected>5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                    </select>
                </div>

                <div class="divider"></div>

                <!-- 名稱設定 -->
                <div id="groupInputs">
                    <!-- 由 JS 產生輸入框 -->
                </div>
            </div>

            <div class="modal-footer">
                <button onclick="toggleSettings()" class="btn btn-outline" style="border: none; box-shadow: none;">取消</button>
                <button onclick="saveSettings()" class="btn btn-primary" style="padding: 10px 24px; font-size: 15px;">儲存</button>
            </div>
        </div>
    </div>

    <script>
        let items = ['組別 1', '組別 2', '組別 3', '組別 4', '組別 5'];
        let currentFinalOrder = []; 
        let isDrawing = false;
        let intervals = []; 

        function init() {
            renderList();
            generateSettingsInputs(); 
        }

        function renderList() {
            const container = document.getElementById('listContainer');
            container.innerHTML = '';

            items.forEach((item, i) => {
                let rankLabel = i + 1;
                let medal = '';
                if (i === 0) medal = '🥇';
                if (i === 1) medal = '🥈';
                if (i === 2) medal = '🥉';

                const itemHTML = `
                    <div class="list-item rank-${i + 1}" id="row-${i}">
                        <div class="rank-badge">${rankLabel}</div>
                        <div class="group-name" id="name-${i}">？？？</div>
                        <div class="status-icon" id="icon-${i}">${medal}</div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', itemHTML);
            });
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function startDraw() {
            if (isDrawing) return;
            isDrawing = true;

            const drawBtn = document.getElementById('drawBtn');
            drawBtn.disabled = true;
            drawBtn.innerHTML = '抽籤中...';

            document.getElementById('resultContainer').classList.add('hidden');
            currentFinalOrder = shuffleArray(items);

            for (let i = 0; i < items.length; i++) {
                document.getElementById(`row-${i}`).classList.remove('highlight');
                document.getElementById(`name-${i}`).classList.add('blur-text');
            }

            intervals = [];
            for (let i = 0; i < items.length; i++) {
                let interval = setInterval(() => {
                    const randomName = items[Math.floor(Math.random() * items.length)];
                    document.getElementById(`name-${i}`).innerText = randomName;
                }, 60); // 稍微加快閃爍速度，增加俐落感
                intervals.push(interval);
            }

            for (let i = 0; i < items.length; i++) {
                let delay = items.length > 5 ? 500 : 700; 
                let revealTime = 800 + (i * delay);

                setTimeout(() => {
                    clearInterval(intervals[i]);

                    const nameEl = document.getElementById(`name-${i}`);
                    nameEl.innerText = currentFinalOrder[i];
                    nameEl.classList.remove('blur-text');

                    const rowEl = document.getElementById(`row-${i}`);
                    rowEl.classList.add('highlight');

                    // 放大特效
                    rowEl.style.transform = 'scale(1.03)';
                    setTimeout(() => { rowEl.style.transform = 'scale(1.01)'; }, 150);

                    if (i === items.length - 1) {
                        finishDraw();
                    }
                }, revealTime);
            }
        }

        function finishDraw() {
            isDrawing = false;
            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');

            drawBtn.classList.add('hidden');
            resetBtn.classList.remove('hidden');
            drawBtn.disabled = false;
            drawBtn.innerHTML = '開始抽籤';

            showTextResult();
        }

        function showTextResult() {
            const resultContainer = document.getElementById('resultContainer');
            const resultText = document.getElementById('resultText');
            
            let textOutput = '';
            currentFinalOrder.forEach((item, index) => {
                textOutput += `${index + 1}. ${item}\n`;
            });
            
            resultText.value = textOutput.trim();
            resultText.rows = currentFinalOrder.length;
            
            resultContainer.classList.remove('hidden');
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 100);
        }

        function copyResult() {
            const resultText = document.getElementById('resultText');
            const copyBtn = document.getElementById('copyBtn');
            
            resultText.select();
            resultText.setSelectionRange(0, 99999); 
            document.execCommand("copy");
            window.getSelection().removeAllRanges();

            const originalHTML = copyBtn.innerHTML;
            copyBtn.innerHTML = '✓ 已複製';
            copyBtn.style.backgroundColor = 'var(--primary)';
            copyBtn.style.color = 'white';
            copyBtn.style.borderColor = 'var(--primary)';
            
            setTimeout(() => {
                copyBtn.innerHTML = originalHTML;
                copyBtn.style.backgroundColor = '';
                copyBtn.style.color = '';
                copyBtn.style.borderColor = '';
            }, 2000);
        }

        function resetDraw() {
            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');

            resetBtn.classList.add('hidden');
            drawBtn.classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('hidden');

            for (let i = 0; i < items.length; i++) {
                let rowEl = document.getElementById(`row-${i}`);
                rowEl.classList.remove('highlight');
                rowEl.style.transform = ''; // 重置縮放
                document.getElementById(`name-${i}`).innerText = '？？？';
                document.getElementById(`name-${i}`).classList.remove('blur-text');
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleSettings() {
            if (isDrawing) return;

            const modal = document.getElementById('settingsModal');
            if (modal.classList.contains('hidden')) {
                document.getElementById('itemCount').value = items.length;
                generateSettingsInputs();
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function generateSettingsInputs() {
            const groupInputs = document.getElementById('groupInputs');
            const countInput = document.getElementById('itemCount');
            let count = parseInt(countInput.value);

            groupInputs.innerHTML = '';
            for (let i = 0; i < count; i++) {
                let defaultName = items[i] !== undefined ? items[i] : `組別 ${i + 1}`;
                groupInputs.innerHTML += `
                    <div class="input-group">
                        <label>名單 ${i + 1}</label>
                        <input type="text" id="input-group-${i}" value="${defaultName}" placeholder="請輸入名稱">
                    </div>
                `;
            }
        }

        function saveSettings() {
            let count = parseInt(document.getElementById('itemCount').value);
            let newItems = [];
            
            for (let i = 0; i < count; i++) {
                const inputEl = document.getElementById(`input-group-${i}`);
                const newName = inputEl.value.trim();
                newItems.push(newName || `組別 ${i + 1}`);
            }

            items = newItems;
            toggleSettings();
            renderList();
            
            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');
            resetBtn.classList.add('hidden');
            drawBtn.classList.remove('hidden');
            document.getElementById('resultContainer').classList.add('hidden');
        }

        window.onload = init;
    </script>
</body>
</html>
