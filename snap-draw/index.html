<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapDraw 小組抽籤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4; /* 替換為淺綠底色 */
            background-image: radial-gradient(#dcfce7 1.5px, transparent 1.5px); /* 替換為綠色網點 */
            background-size: 24px 24px;
        }

        /* 3D 翻牌效果 CSS */
        .flip-container {
            perspective: 1000px;
        }
        .flipper {
            transition: 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            position: relative;
            width: 100%;
            height: 100%;
        }
        .front, .back {
            backface-visibility: hidden;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 1rem;
            background-color: white;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            border: 1px solid #ecfdf5;
            display: flex;
            flex-direction: column;
            padding: 1.25rem;
        }
        .front {
            z-index: 2;
            transform: rotateY(0deg);
        }
        .back {
            transform: rotateY(180deg);
        }
        .flip-container.flipped .flipper {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <!-- 頂部標題與控制區 -->
    <header class="w-full max-w-6xl flex justify-between items-center mb-10 bg-white p-6 rounded-2xl shadow-sm border border-emerald-50">
        <div>
            <h1 class="text-3xl font-black text-gray-800 tracking-wider">🎲 SnapDraw</h1>
            <p class="text-emerald-600 mt-2 text-sm font-medium">小組照片抽籤系統 | 點擊下方按鈕，為各組隨機分配專屬照片</p>
        </div>
        <button onclick="toggleSettings()" class="flex items-center gap-2 px-4 py-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-lg transition-colors font-medium">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            自訂設定
        </button>
    </header>

    <!-- 抽籤卡片顯示區 (因應水平排版，放寬欄位) -->
    <main class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-8 mb-12" id="cardContainer">
        <!-- 卡片將由 JavaScript 動態生成 -->
    </main>

    <!-- 操作按鈕 -->
    <div class="flex gap-4">
        <button id="drawBtn" onclick="startDraw()" class="px-10 py-4 bg-emerald-500 hover:bg-emerald-600 text-white text-xl font-bold rounded-xl shadow-lg shadow-emerald-200 hover:shadow-xl transform hover:-translate-y-1 transition-all tracking-wider">
            開始抽籤
        </button>
        <button id="resetBtn" onclick="resetDraw()" class="hidden px-10 py-4 bg-white hover:bg-emerald-50 text-emerald-600 text-xl font-bold rounded-xl shadow border border-emerald-100 transition-all tracking-wider">
            重新配對
        </button>
    </div>

    <!-- 設定 Modal (預設隱藏) -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto p-8 border-t-8 border-emerald-500">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">設定規則與資料</h2>
            
            <!-- 整體規則設定 -->
            <div class="mb-8 bg-emerald-50/50 p-5 rounded-xl border border-emerald-100 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-base font-semibold text-gray-700 mb-2">組別數量 (2 ~ 10 組)</label>
                    <select id="groupCountSelect" onchange="updateConfig()" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-emerald-500 focus:ring-emerald-500 border p-2.5 text-base bg-white">
                        <option value="2">2 組</option>
                        <option value="3">3 組</option>
                        <option value="4">4 組</option>
                        <option value="5" selected>5 組</option>
                        <option value="6">6 組</option>
                        <option value="7">7 組</option>
                        <option value="8">8 組</option>
                        <option value="9">9 組</option>
                        <option value="10">10 組</option>
                    </select>
                </div>
                <div>
                    <label class="block text-base font-semibold text-gray-700 mb-2">每組抽取照片數 (1 ~ 3 張)</label>
                    <select id="photosPerGroupSelect" onchange="updateConfig()" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-emerald-500 focus:ring-emerald-500 border p-2.5 text-base bg-white">
                        <option value="1">1 張</option>
                        <option value="2" selected>2 張</option>
                        <option value="3">3 張</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- 組別設定 -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">組別名稱</h3>
                    <div id="groupInputs" class="space-y-3">
                        <!-- 由 JS 動態產生 -->
                    </div>
                </div>
                
                <!-- 照片設定 -->
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2 flex items-center justify-between">
                        <span>自訂照片上傳</span>
                        <span class="text-sm font-bold text-emerald-700 bg-emerald-100 px-3 py-1 rounded-full" id="totalPhotosBadge">共需 10 張</span>
                    </h3>
                    <div id="photoInputs" class="space-y-3 max-h-[400px] overflow-y-auto pr-2">
                        <!-- 由 JS 動態產生 -->
                    </div>
                    <p class="text-xs text-gray-500 mt-4 bg-gray-50 p-3 rounded-lg border border-gray-100">
                        💡 <b>提示：</b>系統會將上方的照片打亂，並平均分配給每一組。
                    </p>
                </div>
            </div>

            <div class="mt-8 flex justify-end gap-3 border-t pt-6">
                <button onclick="toggleSettings()" class="px-5 py-2 rounded-lg text-gray-600 hover:bg-gray-100 font-medium transition-colors">取消</button>
                <button onclick="saveSettings()" class="px-5 py-2 rounded-lg bg-emerald-500 hover:bg-emerald-600 text-white font-medium transition-colors">儲存並套用</button>
            </div>
        </div>
    </div>

    <script>
        // 預設資料：5 個組別，每組 2 張照片 (共 10 張照片)
        let groupCount = 5;
        let photosPerGroup = 2;
        let groups = ['第一組', '第二組', '第三組', '第四組', '第五組'];
        let photos = new Array(groupCount * photosPerGroup).fill(''); // 預設產生 10 個空字串
        
        // 預設的小圖片圖示 (SVG Data URI)
        const placeholderIcon = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%239ca3af'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z'/%3E%3C/svg%3E";

        let isDrawn = false;

        // 初始化頁面
        function init() {
            renderCards();
            renderSettings();
            preloadImages();
        }

        // 預載圖片以確保翻牌時不延遲
        function preloadImages() {
            photos.forEach(url => {
                if (url) {
                    const img = new Image();
                    img.src = url;
                }
            });
        }

        // 渲染卡片
        function renderCards() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = '';
            
            groups.forEach((groupName, index) => {
                let placeholdersHTML = '';
                let imagesHTML = '';

                // 根據設定的照片數量產生對應的佔位符與圖片框
                for (let j = 0; j < photosPerGroup; j++) {
                    // 正面：綠色區塊 + 紅色問號
                    placeholdersHTML += `
                        <div class="flex-1 bg-[#8ce0b3] rounded-xl flex items-center justify-center shadow-inner">
                            <span class="text-[#f05252] text-5xl font-black drop-shadow-sm">?</span>
                        </div>
                    `;
                    // 背面：圖片顯示區塊
                    imagesHTML += `
                        <div class="flex-1 bg-gray-100 rounded-xl overflow-hidden relative shadow-inner">
                            <img src="" id="photo-${index}-${j}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x800/ecfdf5/065f46?text=載入失敗'">
                        </div>
                    `;
                }

                // 卡片的共用頂部標頭 (組別標籤)
                const cardHeader = `
                    <div class="flex items-center justify-center gap-3 mb-4 mt-2">
                        <span class="px-3 py-1 bg-[#ccf0d8] text-[#1b7a48] text-xs font-bold rounded-full tracking-widest">組別</span>
                        <h3 class="text-xl font-bold text-gray-800 tracking-wider">${groupName}</h3>
                    </div>
                `;

                // 組合 HTML，卡片高度設定為 h-64 或 h-72 讓橫向照片有足夠空間
                const cardHTML = `
                    <div class="flip-container h-64 md:h-72 w-full" id="card-${index}">
                        <div class="flipper rounded-2xl">
                            <!-- 卡片正面 -->
                            <div class="front">
                                ${cardHeader}
                                <div class="flex-1 flex gap-3 w-full min-h-0">
                                    ${placeholdersHTML}
                                </div>
                            </div>
                            
                            <!-- 卡片背面 -->
                            <div class="back">
                                ${cardHeader}
                                <div class="flex-1 flex gap-3 w-full min-h-0">
                                    ${imagesHTML}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // Fisher-Yates 洗牌演算法 (隨機打亂陣列)
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 開始抽籤
        function startDraw() {
            if (isDrawn) return;
            
            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');
            
            drawBtn.disabled = true;
            drawBtn.classList.add('opacity-50', 'cursor-not-allowed');
            drawBtn.innerText = '抽籤中...';

            // 打亂所有的照片陣列
            const shuffledPhotos = shuffleArray(photos);

            // 依序翻開卡片
            groups.forEach((_, index) => {
                setTimeout(() => {
                    // 根據 photosPerGroup 將對應數量的照片指派給該組
                    for (let j = 0; j < photosPerGroup; j++) {
                        // 計算在全域 shuffledPhotos 陣列中的對應索引
                        const photoIndexInPool = (index * photosPerGroup) + j;
                        const photoSrc = shuffledPhotos[photoIndexInPool] || 'https://placehold.co/600x800/ecfdf5/065f46?text=尚未上傳';
                        document.getElementById(`photo-${index}-${j}`).src = photoSrc;
                    }

                    // 觸發翻牌動畫
                    document.getElementById(`card-${index}`).classList.add('flipped');
                    
                    // 當最後一張翻完時，更新按鈕狀態
                    if (index === groups.length - 1) {
                        setTimeout(() => {
                            isDrawn = true;
                            drawBtn.classList.add('hidden');
                            resetBtn.classList.remove('hidden');
                            drawBtn.disabled = false;
                            drawBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                            drawBtn.innerText = '開始抽籤';
                        }, 600);
                    }
                }, index * 400); // 每張卡片間隔 400 毫秒翻開
            });
        }

        // 重新抽籤 (重置)
        function resetDraw() {
            groups.forEach((_, index) => {
                document.getElementById(`card-${index}`).classList.remove('flipped');
            });

            const drawBtn = document.getElementById('drawBtn');
            const resetBtn = document.getElementById('resetBtn');

            // 等待翻牌動畫結束後再清除圖片
            setTimeout(() => {
                groups.forEach((_, index) => {
                    for (let j = 0; j < photosPerGroup; j++) {
                        document.getElementById(`photo-${index}-${j}`).src = '';
                    }
                });
                isDrawn = false;
                resetBtn.classList.add('hidden');
                drawBtn.classList.remove('hidden');
            }, 600);
        }

        // 開關設定 Modal
        function toggleSettings() {
            const modal = document.getElementById('settingsModal');
            if (modal.classList.contains('hidden')) {
                renderSettings(); // 打開時重新載入最新設定值
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        // 當使用者改變組別數量或照片抽取數量時觸發
        function updateConfig() {
            syncSettingsToState(); // 確保剛打字的資料有存起來

            const newGroupCount = parseInt(document.getElementById('groupCountSelect').value);
            const newPhotosPerGroup = parseInt(document.getElementById('photosPerGroupSelect').value);
            const newTotalPhotos = newGroupCount * newPhotosPerGroup;
            
            // 處理組別陣列的增減
            if (newGroupCount > groupCount) {
                for (let i = groupCount; i < newGroupCount; i++) {
                    groups.push(`第 ${i + 1} 組`);
                }
            } else if (newGroupCount < groupCount) {
                groups = groups.slice(0, newGroupCount);
            }

            // 處理照片陣列的增減
            if (newTotalPhotos > photos.length) {
                for (let i = photos.length; i < newTotalPhotos; i++) {
                    photos.push('');
                }
            } else if (newTotalPhotos < photos.length) {
                photos = photos.slice(0, newTotalPhotos);
            }
            
            groupCount = newGroupCount;
            photosPerGroup = newPhotosPerGroup;
            
            renderCards(); // 組數變更時重新渲染背景卡片數量
            renderSettings(); // 重新渲染設定畫面
        }

        // 將設定視窗內的輸入值同步到陣列中
        function syncSettingsToState() {
            // 儲存組別名稱
            for (let i = 0; i < groupCount; i++) {
                const groupInput = document.getElementById(`input-group-${i}`);
                if (groupInput) {
                    groups[i] = groupInput.value.trim() || `第 ${i + 1} 組`;
                }
            }

            // 儲存所有照片
            const totalPhotos = groupCount * photosPerGroup;
            for (let i = 0; i < totalPhotos; i++) {
                const previewPhoto = document.getElementById(`preview-photo-${i}`);
                if (previewPhoto) {
                    const newPhotoSrc = previewPhoto.src;
                    photos[i] = newPhotoSrc.includes('data:image/svg+xml') ? '' : newPhotoSrc;
                }
            }
        }

        // 渲染設定欄位
        function renderSettings() {
            document.getElementById('groupCountSelect').value = groupCount;
            document.getElementById('photosPerGroupSelect').value = photosPerGroup;
            
            const totalPhotos = groupCount * photosPerGroup;
            document.getElementById('totalPhotosBadge').innerText = `共需 ${totalPhotos} 張`;

            const groupInputs = document.getElementById('groupInputs');
            const photoInputs = document.getElementById('photoInputs');
            
            groupInputs.innerHTML = '';
            photoInputs.innerHTML = '';

            // 1. 渲染組別設定欄位
            for (let i = 0; i < groupCount; i++) {
                groupInputs.innerHTML += `
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">第 ${i + 1} 組</label>
                        <input type="text" id="input-group-${i}" value="${groups[i]}" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-emerald-500 focus:ring-emerald-500 border p-2 text-sm">
                    </div>
                `;
            }

            // 2. 渲染照片上傳欄位 (數量 = 組數 * 每組照片數)
            for (let i = 0; i < totalPhotos; i++) {
                const imgSrc = photos[i] || placeholderIcon;
                const imgClass = photos[i] ? 'w-full h-full object-cover' : 'w-full h-full object-cover p-2 opacity-50';

                photoInputs.innerHTML += `
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">總照片池 - 第 ${i + 1} 張</label>
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 rounded-lg bg-gray-100 overflow-hidden shrink-0 border border-gray-200 flex items-center justify-center">
                                <img id="preview-photo-${i}" src="${imgSrc}" class="${imgClass}">
                            </div>
                            <div class="flex-1">
                                <input type="file" id="input-file-${i}" accept="image/*" class="hidden" onchange="handleFileUpload(event, ${i})">
                                <label for="input-file-${i}" class="cursor-pointer flex items-center justify-center w-full px-4 py-2 bg-white border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 hover:bg-emerald-50 transition-colors">
                                    選擇相簿/檔案
                                </label>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // 處理照片上傳事件
        function handleFileUpload(event, index) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(`preview-photo-${index}`);
                    img.src = e.target.result;
                    img.className = 'w-full h-full object-cover';
                };
                reader.readAsDataURL(file);
            }
        }

        // 儲存設定
        function saveSettings() {
            syncSettingsToState();
            
            toggleSettings();
            resetDraw();
            
            setTimeout(() => {
                renderCards();
                preloadImages();
            }, 600);
        }

        // 啟動程式
        window.onload = init;
    </script>
</body>
</html>
