<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片隨機平均分配器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- 標題區 -->
        <div class="bg-white rounded-2xl shadow-sm p-6 md:p-8 text-center border border-slate-100">
            <h1 class="text-3xl font-bold text-indigo-600 mb-2">
                <i class="fa-solid fa-shuffle mr-2"></i>圖片任務隨機分配器
            </h1>
            <p class="text-slate-500">將 4 張不同的圖片，完美平均且隨機地分配給 40 個人（每張圖剛好 10 人）。</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 設定區 -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 md:col-span-1 h-fit">
                <h2 class="text-xl font-bold mb-4 border-b pb-2"><i class="fa-solid fa-users mr-2"></i>參與者名單</h2>
                <p class="text-sm text-slate-500 mb-4">請在下方輸入參與者的名字，每行一個。如果不輸入，系統會自動使用「人員 1」到「人員 40」代替。</p>
                
                <textarea id="namesInput" rows="12" class="w-full border border-slate-300 rounded-lg p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none mb-4" placeholder="例如：&#10;王小明&#10;陳大同&#10;林美美&#10;... (共40行)"></textarea>
                
                <!-- 警告訊息框 -->
                <div id="warningBox" class="hidden bg-amber-50 text-amber-700 text-sm p-3 rounded-lg border border-amber-200 mb-4">
                    <i class="fa-solid fa-triangle-exclamation mr-1"></i> <span id="warningText"></span>
                </div>

                <button onclick="generateAssignment()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md hover:shadow-lg flex items-center justify-center">
                    <i class="fa-solid fa-wand-magic-sparkles mr-2"></i> 開始隨機分配
                </button>
            </div>

            <!-- 結果區 -->
            <div class="bg-white rounded-2xl shadow-sm p-6 border border-slate-100 md:col-span-2">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold"><i class="fa-solid fa-list-check mr-2"></i>分配結果</h2>
                    <button onclick="copyResults()" id="copyBtn" class="hidden text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 py-1 px-3 rounded transition">
                        <i class="fa-regular fa-copy mr-1"></i> 複製結果
                    </button>
                </div>

                <!-- 尚未分配的提示 -->
                <div id="emptyState" class="text-center py-16 text-slate-400">
                    <i class="fa-regular fa-images text-6xl mb-4 opacity-50"></i>
                    <p>點擊左側的「開始隨機分配」來產生名單</p>
                </div>

                <!-- 統計與名單 (隱藏直到產生) -->
                <div id="resultState" class="hidden fade-in">
                    <!-- 統計卡片 -->
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6" id="summaryContainer">
                        <!-- 動態生成統計 -->
                    </div>

                    <!-- 名單列表 -->
                    <div class="overflow-x-auto rounded-lg border border-slate-200">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 text-slate-600 text-sm uppercase tracking-wider">
                                    <th class="p-3 border-b border-slate-200 w-16 text-center">編號</th>
                                    <th class="p-3 border-b border-slate-200">姓名</th>
                                    <th class="p-3 border-b border-slate-200 w-32 text-center">分配圖片</th>
                                </tr>
                            </thead>
                            <tbody id="resultTableBody" class="text-sm divide-y divide-slate-100">
                                <!-- 動態生成列 -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 複製成功的提示訊息 (Toast) -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg transform transition-all duration-300 translate-y-20 opacity-0 flex items-center">
        <i class="fa-solid fa-check-circle text-green-400 mr-2"></i> 已複製到剪貼簿
    </div>

    <script>
        // Fisher-Yates 洗牌演算法
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function generateAssignment() {
            const namesInput = document.getElementById('namesInput').value;
            let names = namesInput.split('\n').map(n => n.trim()).filter(n => n.length > 0);
            
            const warningBox = document.getElementById('warningBox');
            const warningText = document.getElementById('warningText');

            // 處理人數邏輯
            if (names.length === 0) {
                // 自動產生 40 個人
                for (let i = 1; i <= 40; i++) {
                    names.push(`人員 ${i}`);
                }
                warningBox.classList.add('hidden');
            } else if (names.length !== 40) {
                // 顯示人數不符的警告，但還是繼續執行
                warningText.innerText = `提醒：目前輸入了 ${names.length} 人，而非 40 人。系統仍會盡量平均分配圖片。`;
                warningBox.classList.remove('hidden');
            } else {
                warningBox.classList.add('hidden');
            }

            const totalPeople = names.length;
            const images = [
                { id: '圖 A', color: 'bg-blue-100 text-blue-700 border-blue-200' },
                { id: '圖 B', color: 'bg-emerald-100 text-emerald-700 border-emerald-200' },
                { id: '圖 C', color: 'bg-amber-100 text-amber-700 border-amber-200' },
                { id: '圖 D', color: 'bg-purple-100 text-purple-700 border-purple-200' }
            ];

            // 建立圖片池
            let imagePool = [];
            let baseCount = Math.floor(totalPeople / images.length);
            let remainder = totalPeople % images.length;

            for (let i = 0; i < images.length; i++) {
                // 如果有餘數，前幾個圖片多分配 1 人以確保總數相符
                let countForThisImage = baseCount + (i < remainder ? 1 : 0);
                for (let j = 0; j < countForThisImage; j++) {
                    imagePool.push(images[i]);
                }
            }

            // 將圖片池洗牌打亂
            imagePool = shuffleArray(imagePool);

            // 分配給人員並繪製畫面
            renderResults(names, imagePool, images);
        }

        function renderResults(names, assignedImages, imageDef) {
            document.getElementById('emptyState').classList.add('hidden');
            document.getElementById('resultState').classList.remove('hidden');
            document.getElementById('copyBtn').classList.remove('hidden');

            const tbody = document.getElementById('resultTableBody');
            const summaryContainer = document.getElementById('summaryContainer');
            
            tbody.innerHTML = '';
            summaryContainer.innerHTML = '';

            // 計算統計資料
            let counts = {};
            imageDef.forEach(img => counts[img.id] = 0);

            // 產生表格與統計
            names.forEach((name, index) => {
                const img = assignedImages[index];
                counts[img.id]++;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-3 text-center text-slate-400 font-mono">${index + 1}</td>
                    <td class="p-3 font-medium">${name}</td>
                    <td class="p-3 text-center">
                        <span class="px-3 py-1 rounded-full text-xs font-bold border ${img.color}">
                            ${img.id}
                        </span>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // 繪製統計卡片
            imageDef.forEach(img => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-xl border flex flex-col items-center justify-center ${img.color.replace('text-', 'text-opacity-80 text-').replace('bg-', 'bg-opacity-50 bg-')}`;
                div.innerHTML = `
                    <span class="text-sm font-bold mb-1">${img.id}</span>
                    <span class="text-2xl font-black">${counts[img.id]} <span class="text-xs font-normal opacity-70">人</span></span>
                `;
                summaryContainer.appendChild(div);
            });
        }

        function copyResults() {
            const tbody = document.getElementById('resultTableBody');
            const rows = tbody.querySelectorAll('tr');
            if (rows.length === 0) return;

            let textToCopy = "【圖片分配結果】\n";
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                const num = cells[0].innerText;
                const name = cells[1].innerText;
                const image = cells[2].innerText.trim();
                textToCopy += `${num}. ${name} -> ${image}\n`;
            });

            // 使用 document.execCommand 作為備案以確保 iframe 內可運作
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                showToast();
            } catch (err) {
                console.error('複製失敗', err);
            }
            document.body.removeChild(textArea);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
