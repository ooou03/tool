<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地景故事卡</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* 簡易的淡入動畫 */
    .fade-in {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body class="min-h-screen bg-stone-100 font-sans text-stone-800 pb-12">

  <div id="app-container">
    <!-- Header -->
    <header class="bg-emerald-800 text-white p-6 rounded-b-3xl shadow-lg mb-8">
      <h1 class="text-2xl font-bold flex items-center gap-2">
        <i data-lucide="map-pin" class="w-7 h-7"></i>
        地景故事卡
      </h1>
      <p class="mt-3 text-emerald-100 text-sm leading-relaxed">
        在走讀進行中，請隨時記下你所看見的以及你的感想，把它化作一張一張專屬的明信片！<br />
        你可以一路上用它來做紀錄！多做幾張都可以喔！只要你想記錄就記錄下來，但記得要傳到群組來分享！
      </p>
    </header>

    <main class="max-w-md mx-auto px-4">
      
      <!-- 表單填寫區塊 -->
      <div id="form-view" class="space-y-6 block">
        
        <!-- 步驟一：照片 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-200">
          <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-emerald-700">
            <i data-lucide="image" class="w-5 h-5"></i>
            1. 捕捉一瞬
          </h2>
          <p class="text-sm text-stone-500 mb-4">今天哪個畫面最讓你感動？拍下來或選一張照片。</p>
          
          <input
            type="file"
            id="file-input"
            accept="image/*"
            capture="environment"
            class="hidden"
          />
          
          <!-- 上傳按鈕區 -->
          <button 
            id="upload-btn"
            class="w-full aspect-video border-2 border-dashed border-emerald-300 rounded-xl flex flex-col items-center justify-center text-emerald-600 hover:bg-emerald-50 transition-colors"
          >
            <i data-lucide="camera" class="w-10 h-10 mb-2 opacity-70"></i>
            <span class="font-medium">點此拍照或上傳圖片</span>
          </button>

          <!-- 預覽圖片區 (預設隱藏) -->
          <div id="preview-container" class="hidden relative rounded-xl overflow-hidden aspect-video bg-stone-100 flex items-center justify-center cursor-pointer">
            <img id="preview-img" src="" alt="Preview" class="w-full h-full object-cover" />
            <div class="absolute inset-0 bg-black bg-opacity-30 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
              <span class="text-white bg-black bg-opacity-50 px-4 py-2 rounded-full text-sm">點擊更換照片</span>
            </div>
          </div>
        </div>

        <!-- 步驟二：核心感受 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-200">
          <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-emerald-700">
            <i data-lucide="heart" class="w-5 h-5"></i>
            2. 核心感受
          </h2>
          <p class="text-sm text-stone-500 mb-4">選一個最能代表今天踏查的詞彙。</p>
          <div id="keyword-container" class="flex flex-wrap gap-2">
            <!-- 關鍵字按鈕將由 JS 動態生成 -->
          </div>
        </div>

        <!-- 步驟三：寫下感想與署名 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-200">
          <h2 class="text-lg font-bold mb-3 flex items-center gap-2 text-emerald-700">
            <i data-lucide="feather" class="w-5 h-5"></i>
            3. 寫下感想與署名
          </h2>
          <p class="text-sm text-stone-500 mb-4">寫下你對這裡的想法，並留下您的大名。</p>
          
          <div class="flex items-center bg-stone-50 border border-stone-200 rounded-xl mb-3 overflow-hidden focus-within:ring-2 focus-within:ring-emerald-500">
            <div class="pl-3 pr-2 text-stone-400">
              <i data-lucide="user" class="w-5 h-5"></i>
            </div>
            <input
              type="text"
              id="author-input"
              placeholder="您的名字或暱稱 (必填)"
              class="w-full py-3 pr-3 bg-transparent border-none outline-none text-stone-700 placeholder-stone-400"
              maxlength="15"
            />
          </div>

          <textarea
            id="story-input"
            placeholder="例如：看見老街的紅磚，想像未來這裡能成為充滿活力的藝文聚落..."
            class="w-full h-32 p-4 border border-stone-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent resize-none bg-stone-50"
            maxlength="100"
          ></textarea>
          <div class="text-right text-xs text-stone-400 mt-1">
            <span id="char-count">0</span>/100 字
          </div>
        </div>

        <!-- 產生按鈕 -->
        <button
          id="generate-btn"
          class="w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all bg-stone-400 cursor-not-allowed"
          disabled
        >
          請先上傳一張照片 📷
        </button>
      </div>

      <!-- 完成畫面 (預設隱藏) -->
      <div id="result-view" class="hidden space-y-6 fade-in">
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-stone-200">
          <img id="generated-img" src="" alt="Generated Postcard" class="w-full rounded-xl shadow-md" />
        </div>
        
        <div class="flex gap-4">
          <!-- 更改為呼叫原生分享/儲存選單的按鈕 -->
          <button
            id="download-btn"
            class="flex-1 bg-emerald-600 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-emerald-700 active:scale-95 shadow-md"
          >
            <i data-lucide="share" class="w-5 h-5"></i>
            儲存至相簿 / 分享
          </button>
          
          <button
            id="retry-btn"
            class="px-6 bg-stone-200 text-stone-700 py-4 rounded-xl font-bold flex items-center justify-center hover:bg-stone-300 active:scale-95"
          >
            <i data-lucide="refresh-ccw" class="w-5 h-5"></i>
          </button>
        </div>
        <p class="text-center text-sm text-stone-500">
          💡 點擊上方按鈕，選擇「儲存影像」即可存入相簿，或直接分享至 LINE！
        </p>
      </div>

    </main>
  </div>

  <script>
    // 初始化 Lucide Icons
    lucide.createIcons();

    // 狀態變數
    let imageSrc = null;
    let selectedKeyword = '地方記憶';
    let isGenerating = false;
    let generatedCardDataUrl = null;
    const keywordsList = ['地方記憶', '生態共好', '歷史傳承', '未來想像', '走讀感動', '尋常之美'];

    // DOM 元素
    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const previewContainer = document.getElementById('preview-container');
    const previewImg = document.getElementById('preview-img');
    
    const keywordContainer = document.getElementById('keyword-container');
    const authorInput = document.getElementById('author-input');
    const storyInput = document.getElementById('story-input');
    const charCount = document.getElementById('char-count');
    const generateBtn = document.getElementById('generate-btn');
    
    const formView = document.getElementById('form-view');
    const resultView = document.getElementById('result-view');
    const generatedImg = document.getElementById('generated-img');
    const downloadBtn = document.getElementById('download-btn');
    const retryBtn = document.getElementById('retry-btn');

    // 1. 渲染關鍵字標籤
    function renderKeywords() {
      keywordContainer.innerHTML = '';
      keywordsList.forEach(kw => {
        const btn = document.createElement('button');
        btn.textContent = kw;
        if (kw === selectedKeyword) {
          btn.className = 'px-4 py-2 rounded-full text-sm font-medium transition-all bg-emerald-600 text-white shadow-md transform scale-105';
        } else {
          btn.className = 'px-4 py-2 rounded-full text-sm font-medium transition-all bg-stone-100 text-stone-600 hover:bg-stone-200';
        }
        btn.onclick = () => {
          selectedKeyword = kw;
          renderKeywords();
        };
        keywordContainer.appendChild(btn);
      });
    }
    renderKeywords();

    // 2. 處理字數統計
    storyInput.addEventListener('input', () => {
      charCount.textContent = storyInput.value.length;
    });

    // 3. 處理按鈕狀態
    function updateGenerateBtnState() {
      const authorName = authorInput.value.trim();
      
      if (isGenerating) {
        generateBtn.textContent = '正在施展魔法...';
        generateBtn.disabled = true;
        generateBtn.className = 'w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all bg-stone-400 cursor-not-allowed';
      } else if (!imageSrc) {
        generateBtn.textContent = '請先上傳一張照片 📷';
        generateBtn.disabled = true;
        generateBtn.className = 'w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all bg-stone-400 cursor-not-allowed';
      } else if (!authorName) {
        generateBtn.textContent = '請填寫您的名字 ✍️';
        generateBtn.disabled = true;
        generateBtn.className = 'w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all bg-stone-400 cursor-not-allowed';
      } else {
        generateBtn.textContent = '✨ 產生我的地景故事卡';
        generateBtn.disabled = false;
        generateBtn.className = 'w-full py-4 rounded-xl font-bold text-lg text-white shadow-lg transition-all bg-emerald-600 hover:bg-emerald-700 active:scale-95';
      }
    }
    authorInput.addEventListener('input', updateGenerateBtnState);

    // 4. 處理照片上傳
    uploadBtn.addEventListener('click', () => fileInput.click());
    previewContainer.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          imageSrc = event.target.result;
          previewImg.src = imageSrc;
          
          uploadBtn.classList.add('hidden');
          previewContainer.classList.remove('hidden');
          updateGenerateBtnState();
        };
        reader.readAsDataURL(file);
      }
    });

    // 5. 處理 Canvas 文字換行
    function wrapText(context, text, x, y, maxWidth, lineHeight) {
      const words = text.split('');
      let line = '';
      for (let n = 0; n < words.length; n++) {
        const testLine = line + words[n];
        const metrics = context.measureText(testLine);
        const testWidth = metrics.width;
        if (testWidth > maxWidth && n > 0 && words[n] !== '，' && words[n] !== '。') {
          context.fillText(line, x, y);
          line = words[n];
          y += lineHeight;
        } else {
          line = testLine;
        }
      }
      context.fillText(line, x, y);
      return y + lineHeight;
    }

    // 圓角矩形 Polyfill
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.beginPath();
      this.moveTo(x + r, y);
      this.arcTo(x + w, y, x + w, y + h, r);
      this.arcTo(x + w, y + h, x, y + h, r);
      this.arcTo(x, y + h, x, y, r);
      this.arcTo(x, y, x + r, y, r);
      this.closePath();
      return this;
    };

    // 6. 生成明信片
    generateBtn.addEventListener('click', () => {
      const authorName = authorInput.value.trim();
      const story = storyInput.value;
      if (!imageSrc || !authorName) return;

      isGenerating = true;
      updateGenerateBtnState();

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      canvas.width = 1080;
      canvas.height = 1350;

      // 繪製背景
      ctx.fillStyle = '#f5f5f0';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const img = new Image();
      img.onload = () => {
        const targetWidth = 980;
        const targetHeight = 800;
        const xOffset = 50;
        const yOffset = 50;

        const imgRatio = img.width / img.height;
        const targetRatio = targetWidth / targetHeight;
        let drawWidth, drawHeight, drawX, drawY;

        if (imgRatio > targetRatio) {
          drawHeight = img.height;
          drawWidth = img.height * targetRatio;
          drawX = (img.width - drawWidth) / 2;
          drawY = 0;
        } else {
          drawWidth = img.width;
          drawHeight = img.width / targetRatio;
          drawX = 0;
          drawY = (img.height - drawHeight) / 2;
        }

        ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight, xOffset, yOffset, targetWidth, targetHeight);

        // 邊框
        ctx.strokeStyle = '#e5e7eb';
        ctx.lineWidth = 4;
        ctx.strokeRect(xOffset, yOffset, targetWidth, targetHeight);

        // 地點
        ctx.fillStyle = '#166534';
        ctx.font = 'bold 36px sans-serif';
        ctx.fillText('📍 地景走讀', 50, 930);

        // 標籤
        ctx.fillStyle = '#dcfce7';
        ctx.roundRect(330, 895, 180, 48, 24);
        ctx.fill();
        ctx.fillStyle = '#166534';
        ctx.font = 'bold 24px sans-serif';
        ctx.fillText(`# ${selectedKeyword}`, 355, 928);

        // 故事文字
        ctx.fillStyle = '#374151';
        ctx.font = '36px sans-serif';
        wrapText(ctx, story || '（留下了一片空白的想像...）', 50, 1000, 980, 56);

        // 底部左側
        ctx.fillStyle = '#9ca3af';
        ctx.font = '24px sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('—— 獻給這片土地的美麗想像', 50, canvas.height - 50);

        // 底部右側作者
        ctx.fillStyle = '#166534';
        ctx.font = 'bold 28px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(`✎ 走讀人：${authorName}`, canvas.width - 50, canvas.height - 50);
        
        // 儲存結果並切換畫面
        generatedCardDataUrl = canvas.toDataURL('image/jpeg', 0.9);
        generatedImg.src = generatedCardDataUrl;
        
        isGenerating = false;
        updateGenerateBtnState();

        formView.classList.remove('block');
        formView.classList.add('hidden');
        resultView.classList.remove('hidden');
        resultView.classList.add('block');
      };
      img.src = imageSrc;
    });

    // 輔助函式：將 base64 轉為 File 物件 (為了讓原生分享 API 支援圖片)
    function dataURLtoFile(dataurl, filename) {
      let arr = dataurl.split(','),
          mime = arr[0].match(/:(.*?);/)[1],
          bstr = atob(arr[1]),
          n = bstr.length,
          u8arr = new Uint8Array(n);
      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }
      return new File([u8arr], filename, { type: mime });
    }

    // 7. 處理下載 / 分享 (更新為支援存入相簿的原生選單)
    downloadBtn.addEventListener('click', async () => {
      if (!generatedCardDataUrl) return;

      const filename = `走讀_${authorInput.value.trim()}.jpg`;

      // 檢查瀏覽器是否支援 Web Share API，並且支援分享檔案
      if (navigator.canShare) {
        try {
          const file = dataURLtoFile(generatedCardDataUrl, filename);
          
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({
              files: [file],
              title: '地景故事卡',
              text: '這是我剛製作的地景故事卡，分享給大家！'
            });
            return; // 成功呼叫原生分享選單，結束流程
          }
        } catch (error) {
          console.log('使用者取消分享或分享失敗，改用一般下載', error);
        }
      }

      // 如果不支援分享 API，或是使用者取消，則退回「一般網頁下載模式」
      const link = document.createElement('a');
      link.download = filename;
      link.href = generatedCardDataUrl;
      link.click();
    });

    // 8. 重新製作
    retryBtn.addEventListener('click', () => {
      generatedCardDataUrl = null;
      generatedImg.src = '';
      
      resultView.classList.remove('block');
      resultView.classList.add('hidden');
      formView.classList.remove('hidden');
      formView.classList.add('block');
    });

  </script>
</body>
</html>
